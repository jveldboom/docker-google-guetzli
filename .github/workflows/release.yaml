---
name: release

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile # only release when the Dockerfile changes, as it's the only build artifact

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get next version
        uses: jveldboom/action-conventional-versioning@v1
        id: version

      - name: Log in to the container registry
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a # v2.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        run: |
          docker build . \
            --tag ghcr.io/${GITHUB_REPOSITORY}:${{ steps.version.outputs.version }} \
            --tag ghcr.io/${GITHUB_REPOSITORY}:latest

          docker push --all-tags ghcr.io/${GITHUB_REPOSITORY}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --generate-notes \
            --target "${{ github.sha }}"
